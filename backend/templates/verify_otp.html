<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CrisisSense — Verify OTP</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
:root{--red:#c0392b;--red-light:#e85d4a;--green:#1a7a6e;--bg:#0d0d0d;--panel:#141414;--border:#2a2a2a;--text:#e8e8e8;--text-sub:#999;--input-bg:#1a1a1a;--shadow:0 4px 32px rgba(0,0,0,.5)}
[data-theme="light"]{--bg:#f4f4f4;--panel:#fff;--border:#d8d8d8;--text:#1a1a1a;--text-sub:#666;--input-bg:#f9f9f9;--shadow:0 4px 24px rgba(0,0,0,.1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px;transition:background .3s,color .3s}
.topbar{width:100%;max-width:480px;display:flex;align-items:center;justify-content:space-between;padding:14px 0 26px;border-bottom:1px solid var(--border);margin-bottom:36px}
.brand{font-family:'Share Tech Mono',monospace;font-size:14px;color:var(--red);letter-spacing:2px}
.status-dot{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-sub);font-family:'Share Tech Mono',monospace}
.dot{width:9px;height:9px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.card{width:100%;max-width:480px;background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:36px 32px;box-shadow:var(--shadow);animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--red);letter-spacing:2px;margin-bottom:10px}
.card h1{font-size:26px;font-weight:900;line-height:1.2;margin-bottom:8px;color:var(--text)}
.card p.desc{color:var(--text-sub);font-size:15px;line-height:1.6;margin-bottom:26px}
.otp-row{display:flex;gap:10px;justify-content:center;margin:10px 0 20px}
.otp-digit{width:54px;height:64px;background:var(--input-bg);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:28px;font-family:'Share Tech Mono',monospace;text-align:center;outline:none;transition:border .2s}
.otp-digit:focus{border-color:var(--red)}
.btn-primary{width:100%;margin-top:8px;padding:16px;background:var(--red);color:#fff;font-size:17px;font-weight:700;font-family:'Barlow',sans-serif;border:none;border-radius:8px;cursor:pointer;letter-spacing:.3px;transition:background .2s,transform .1s}
.btn-primary:hover{background:var(--red-light)}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{background:var(--border);color:var(--text-sub);cursor:not-allowed}
.err{color:var(--red-light);font-size:14px;font-weight:600;margin-top:12px;min-height:20px;display:flex;align-items:center;gap:6px}
.hint{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-sub);background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);border-radius:8px;padding:12px 14px;margin-bottom:4px;line-height:1.6}
.foot-link{text-align:center;margin-top:20px;font-size:14px;color:var(--text-sub)}
.foot-link a{color:var(--red);text-decoration:none;font-weight:700}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand">⚡ CRISISSENSE</div>
  <div class="status-dot"><div class="dot"></div>SYSTEM ONLINE</div>
</div>

<div class="card">
  <div class="card-tag">🔑 OTP VERIFICATION</div>
  <h1>Verify Your Account</h1>
  <p class="desc">Enter the 6-digit code sent to your contact. Check the server console for the OTP (simulated).</p>

  <div class="hint">💡 In demo mode the OTP is printed in the Flask console. Check your terminal!</div>

  <div class="otp-row" id="otpRow">
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
    <input class="otp-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
  </div>

  <div class="err" id="errMsg"></div>
  <button class="btn-primary" id="verifyBtn" onclick="doVerify()">VERIFY & CONTINUE →</button>
  <div class="foot-link"><a href="/signup">← Back to Sign Up</a></div>
</div>

<script>
const digits=document.querySelectorAll('.otp-digit');
digits.forEach((d,i)=>{
  d.addEventListener('input',()=>{
    if(d.value.length===1&&i<digits.length-1)digits[i+1].focus();
  });
  d.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!d.value&&i>0)digits[i-1].focus();
    if(e.key==='Enter')doVerify();
  });
  // allow paste of full OTP
  d.addEventListener('paste',e=>{
    const pasted=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'');
    if(pasted.length===6){
      digits.forEach((dd,ii)=>{dd.value=pasted[ii]||'';});
      digits[5].focus();
      e.preventDefault();
    }
  });
});

async function doVerify(){
  const otp=[...digits].map(d=>d.value).join('');
  const err=document.getElementById('errMsg');
  const btn=document.getElementById('verifyBtn');
  err.textContent='';
  if(otp.length<6){err.textContent='⚠ Please enter all 6 digits.';return;}
  btn.disabled=true;btn.textContent='VERIFYING...';
  try{
    const res=await fetch('/api/verify-otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({otp})});
    const data=await res.json();
    if(data.redirect){window.location.href=data.redirect;}
    else{err.textContent='⚠ '+(data.error||'Verification failed');}
  }catch(e){err.textContent='⚠ Network error. Try again.';}
  finally{btn.disabled=false;btn.textContent='VERIFY & CONTINUE →';}
}
</script>
</body>
</html>
